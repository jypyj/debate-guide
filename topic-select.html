<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>토론 주제 선택 | 2026 공통영어1</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #2563eb;
  --bluedark: #1d4ed8;
  --bluelight: #eff6ff;
  --green: #16a34a;
  --red: #dc2626;
  --gray50: #f8fafc;
  --gray100: #f1f5f9;
  --gray200: #e2e8f0;
  --gray400: #94a3b8;
  --gray600: #475569;
  --gray800: #1e293b;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
}

body {
  font-family: 'Malgun Gothic','맑은 고딕',Apple SD Gothic Neo,sans-serif;
  background: var(--gray100);
  color: var(--gray800);
  line-height: 1.65;
  font-size: 15px;
}

/* ── 헤더 ── */
.site-header {
  background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
  color: #fff;
  padding: 32px 24px 28px;
  text-align: center;
}
.site-header h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -.5px; }
.site-header p { margin-top: 6px; opacity: .8; font-size: .88rem; }

/* ── 컨테이너 ── */
.container { max-width: 640px; margin: 0 auto; padding: 20px 16px 40px; }

/* ── 카드 ── */
.card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px 20px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 1.05rem;
  font-weight: 700;
  color: #1e3a8a;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 12px;
  border-bottom: 1.5px solid var(--gray200);
}
.card-title .num {
  background: var(--blue);
  color: #fff;
  font-size: .72rem;
  font-weight: 700;
  padding: 4px 11px;
  border-radius: 99px;
  letter-spacing: .3px;
}
.card-desc {
  font-size: .85rem;
  color: var(--gray600);
  margin-bottom: 14px;
  line-height: 1.6;
}

/* ── 입력 ── */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-group { margin-bottom: 12px; }
.form-group:last-child { margin-bottom: 0; }
.form-group label {
  display: block;
  font-size: .82rem;
  font-weight: 700;
  color: var(--gray600);
  margin-bottom: 5px;
}
.form-group select,
.form-group input[type=text] {
  width: 100%;
  padding: 10px 13px;
  border: 1.5px solid var(--gray200);
  border-radius: 8px;
  font: inherit;
  font-size: .9rem;
  background: var(--gray50);
  color: var(--gray800);
  transition: border-color .15s, box-shadow .15s;
}
.form-group select:focus,
.form-group input[type=text]:focus {
  outline: none;
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(37,99,235,.12);
  background: #fff;
}

/* ── 주제 선택 ── */
.topic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.topic-cat { border: 1.5px solid var(--gray200); border-radius: 10px; overflow: hidden; }
.topic-cat-head { background: var(--gray100); padding: 7px 13px; font-size: .75rem; font-weight: 800; color: #1e3a8a; letter-spacing: .8px; }
.topic-opts { padding: 8px 10px; }
.topic-opt { display: flex; align-items: flex-start; gap: 7px; padding: 5px 2px; cursor: pointer; transition: background .15s; border-radius: 6px; }
.topic-opt:hover { background: var(--bluelight); }
.topic-opt input[type=radio] { margin-top: 3px; accent-color: var(--blue); cursor: pointer; flex-shrink: 0; }
.topic-opt span { font-size: .82rem; line-height: 1.4; }
.topic-opt input[type=radio]:checked + span { color: var(--blue); font-weight: 600; }

/* ── 선택된 주제 표시 ── */
.selected-topic {
  display: none;
  background: var(--bluelight);
  border: 1.5px solid var(--blue);
  border-radius: 10px;
  padding: 14px 16px;
  margin-top: 14px;
  font-size: .88rem;
  color: #1e3a8a;
  font-weight: 600;
  text-align: center;
  animation: fadeIn .3s ease;
}
.selected-topic.show { display: block; }
.selected-topic .label { font-size: .75rem; font-weight: 400; color: var(--gray600); display: block; margin-bottom: 4px; }

/* ── 버튼 ── */
.btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 10px;
  font: inherit;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
}
.btn-submit {
  background: linear-gradient(135deg, var(--blue), var(--bluedark));
  color: #fff;
  box-shadow: 0 4px 14px rgba(37,99,235,.3);
}
.btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,.4); }
.btn-submit:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-reset {
  background: var(--gray200);
  color: var(--gray600);
  margin-top: 10px;
}
.btn-reset:hover { background: #cbd5e1; }

/* ── 결과 화면 ── */
.result {
  display: none;
  text-align: center;
  padding: 40px 20px;
  animation: fadeIn .5s ease;
}
.result.show { display: block; }
.result .check-circle {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #48BB78, #38A169);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  animation: popIn .5s ease;
}
.result .check-circle svg {
  width: 36px; height: 36px;
  stroke: #fff;
  stroke-width: 3;
  fill: none;
}
.result h2 { font-size: 1.3rem; color: #1e3a8a; margin-bottom: 8px; }
.result p { font-size: .88rem; color: var(--gray600); margin-bottom: 6px; }
.result .info-box {
  display: inline-block;
  margin-top: 14px;
  padding: 14px 24px;
  background: var(--bluelight);
  border-radius: 10px;
  font-size: .88rem;
  color: #1e3a8a;
  font-weight: 600;
  text-align: left;
  line-height: 1.8;
}
.result .btn-reset { margin-top: 24px; width: auto; display: inline-block; padding: 12px 32px; }

/* ── 에러 ── */
.error-msg {
  color: var(--red);
  font-size: .78rem;
  margin-top: 8px;
  display: none;
  text-align: center;
}
.error-msg.show { display: block; }

/* ── 토스트 ── */
.toast {
  position: fixed; top: 18px; right: 18px;
  background: var(--green); color: #fff;
  padding: 10px 20px; border-radius: 99px;
  font-size: .82rem; font-weight: 700;
  opacity: 0; transform: translateY(-6px);
  transition: opacity .25s, transform .25s; z-index: 500;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── 반응형 ── */
@media (max-width: 600px) {
  .topic-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr 1fr; }
  .site-header h1 { font-size: 1.3rem; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes popIn {
  0% { transform: scale(0); }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
</style>
</head>
<body>

<div class="toast" id="toast">제출 완료!</div>

<!-- 헤더 -->
<header class="site-header">
  <h1>토론 주제 선택</h1>
  <p>2026 1학기 공통영어1 수행평가</p>
</header>

<div class="container">

  <!-- 폼 영역 -->
  <div id="formArea">

    <!-- 학생 정보 -->
    <div class="card">
      <div class="card-title">
        <span class="num">STEP 1</span>
        학생 정보 입력
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="grade">학년</label>
          <select id="grade">
            <option value="">선택</option>
            <option value="1">1학년</option>
            <option value="2">2학년</option>
            <option value="3">3학년</option>
          </select>
        </div>
        <div class="form-group">
          <label for="classNum">반</label>
          <select id="classNum">
            <option value="">선택</option>
            <option value="1">1반</option>
            <option value="2">2반</option>
            <option value="3">3반</option>
            <option value="4">4반</option>
            <option value="5">5반</option>
            <option value="6">6반</option>
            <option value="7">7반</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="number">번호</label>
          <input type="text" id="number" placeholder="예: 15" inputmode="numeric" maxlength="3">
        </div>
        <div class="form-group">
          <label for="sname">이름</label>
          <input type="text" id="sname" placeholder="이름을 입력하세요">
        </div>
      </div>
    </div>

    <!-- 주제 선택 -->
    <div class="card">
      <div class="card-title">
        <span class="num">STEP 2</span>
        토론 주제 선택
      </div>
      <p class="card-desc">아래 목록에서 토론하고 싶은 주제를 하나 선택하세요. 목록에 없는 주제를 원하면 아래에 직접 입력할 수도 있습니다.</p>

      <div class="topic-grid">
        <div class="topic-cat">
          <div class="topic-cat-head">SOCIETY</div>
          <div class="topic-opts">
            <label class="topic-opt"><input type="radio" name="topic" value="Should we follow unjust rules?" onchange="onTopicChange()"><span>Should we follow unjust rules?</span></label>
            <label class="topic-opt"><input type="radio" name="topic" value="Should no-kids zones be allowed?" onchange="onTopicChange()"><span>Should no-kids zones be allowed?</span></label>
            <label class="topic-opt"><input type="radio" name="topic" value="Plastic waste: Should individuals or corporations take more responsibility?" onchange="onTopicChange()"><span>Plastic waste: Should individuals or corporations take more responsibility?</span></label>
            <label class="topic-opt"><input type="radio" name="topic" value="Should social minorities patiently wait or take active action to address social discrimination?" onchange="onTopicChange()"><span>Should social minorities patiently wait or take active action to address social discrimination?</span></label>
          </div>
        </div>

        <div class="topic-cat">
          <div class="topic-cat-head">AI-EDUCATION</div>
          <div class="topic-opts">
            <label class="topic-opt"><input type="radio" name="topic" value="Should AI tools be allowed in school assessments and exams?" onchange="onTopicChange()"><span>Should AI tools be allowed in school assessments and exams?</span></label>
            <label class="topic-opt"><input type="radio" name="topic" value="Will dependency on AI tools make students less creative or critical?" onchange="onTopicChange()"><span>Will dependency on AI tools make students less creative or critical?</span></label>
            <label class="topic-opt"><input type="radio" name="topic" value="Can AI replace teachers?" onchange="onTopicChange()"><span>Can AI replace teachers?</span></label>
          </div>
        </div>

        <div class="topic-cat">
          <div class="topic-cat-head">AI-WORK</div>
          <div class="topic-opts">
            <label class="topic-opt"><input type="radio" name="topic" value="Should companies use more AI programs to replace employees and cut the budget?" onchange="onTopicChange()"><span>Should companies use more AI programs to replace employees and cut the budget?</span></label>
            <label class="topic-opt"><input type="radio" name="topic" value="Is it okay to use AI in the hiring process?" onchange="onTopicChange()"><span>Is it okay to use AI in the hiring process?</span></label>
          </div>
        </div>

        <div class="topic-cat">
          <div class="topic-cat-head">AI-ART</div>
          <div class="topic-opts">
            <label class="topic-opt"><input type="radio" name="topic" value="Should AI-generated content be protected by copyright?" onchange="onTopicChange()"><span>Should AI-generated content be protected by copyright?</span></label>
            <label class="topic-opt"><input type="radio" name="topic" value="Who gets the rights to content created by AI?" onchange="onTopicChange()"><span>Who gets the rights to content created by AI? (AI / developer / user)</span></label>
          </div>
        </div>

        <div class="topic-cat">
          <div class="topic-cat-head">AI-SOCIETY</div>
          <div class="topic-opts">
            <label class="topic-opt"><input type="radio" name="topic" value="Is AI an environmentally sustainable tool?" onchange="onTopicChange()"><span>Is AI an environmentally sustainable tool?</span></label>
            <label class="topic-opt"><input type="radio" name="topic" value="Does AI increase social inequality between rich and poor?" onchange="onTopicChange()"><span>Does AI increase social inequality between rich and poor?</span></label>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="customTopic">직접 주제 만들기 (위에서 선택하지 않은 경우)</label>
        <input type="text" id="customTopic" placeholder="나만의 토론 주제를 입력하세요..." oninput="onCustomInput()">
      </div>

      <div class="selected-topic" id="selectedTopic">
        <span class="label">선택한 주제</span>
        <span id="selectedTopicText"></span>
      </div>
    </div>

    <!-- 제출 -->
    <div class="error-msg" id="errorMsg"></div>
    <button class="btn btn-submit" id="btnSubmit" onclick="submitForm()">제출하기</button>
    <button class="btn btn-reset" onclick="resetForm()">초기화</button>

  </div>

  <!-- 결과 화면 -->
  <div class="result" id="resultArea">
    <div class="check-circle">
      <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"></polyline></svg>
    </div>
    <h2>제출 완료!</h2>
    <p>토론 주제 선택이 정상적으로 제출되었습니다.</p>
    <p style="font-size:.82rem; color:#888;">같은 반에서 같은 주제를 선택한 친구들과 자동으로 조가 편성됩니다.</p>
    <div class="info-box" id="resultInfo"></div>
    <br>
    <button class="btn btn-reset" onclick="resetForm()">다시 제출하기</button>
  </div>

</div>

<script>
// ★★ Apps Script 배포 URL을 여기에 입력하세요 ★★
const SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';

/* ── 주제 선택 이벤트 ── */
function onTopicChange() {
  document.getElementById('customTopic').value = '';
  updateSelectedDisplay();
}

function onCustomInput() {
  const custom = document.getElementById('customTopic').value.trim();
  if (custom) {
    document.querySelectorAll('input[name=topic]').forEach(r => r.checked = false);
  }
  updateSelectedDisplay();
}

function updateSelectedDisplay() {
  const topic = getSelectedTopic();
  const box = document.getElementById('selectedTopic');
  const text = document.getElementById('selectedTopicText');
  if (topic) {
    text.textContent = topic;
    box.classList.add('show');
  } else {
    box.classList.remove('show');
  }
}

function getSelectedTopic() {
  const radio = document.querySelector('input[name=topic]:checked');
  if (radio) return radio.value;
  const custom = document.getElementById('customTopic').value.trim();
  return custom || '';
}

/* ── 제출 ── */
async function submitForm() {
  const grade = document.getElementById('grade').value;
  const classNum = document.getElementById('classNum').value;
  const number = document.getElementById('number').value.trim();
  const name = document.getElementById('sname').value.trim();
  const topic = getSelectedTopic();

  // 유효성 검사
  const missing = [];
  if (!grade) missing.push('학년');
  if (!classNum) missing.push('반');
  if (!number) missing.push('번호');
  if (!name) missing.push('이름');
  if (!topic) missing.push('토론 주제');

  const errEl = document.getElementById('errorMsg');
  if (missing.length) {
    errEl.textContent = '미입력 항목: ' + missing.join(', ');
    errEl.classList.add('show');
    return;
  }
  errEl.classList.remove('show');

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = '제출 중...';

  const data = {
    timestamp: new Date().toLocaleString('ko-KR'),
    grade: grade,
    classNum: classNum,
    number: number,
    name: name,
    topic: topic
  };

  try {
    if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      alert('Apps Script URL이 설정되지 않았습니다.');
      btn.disabled = false;
      btn.textContent = '제출하기';
      return;
    }

    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(data)
    });

    // 결과 표시
    document.getElementById('resultInfo').innerHTML =
      `${grade}학년 ${classNum}반 ${number}번 ${name}<br>주제: ${topic}`;
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('resultArea').classList.add('show');

    // 토스트
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);

  } catch (err) {
    errEl.textContent = '제출 오류: ' + err.message;
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = '제출하기';
  }
}

/* ── 초기화 ── */
function resetForm() {
  document.getElementById('grade').value = '';
  document.getElementById('classNum').value = '';
  document.getElementById('number').value = '';
  document.getElementById('sname').value = '';
  document.getElementById('customTopic').value = '';
  document.querySelectorAll('input[name=topic]').forEach(r => r.checked = false);
  document.getElementById('selectedTopic').classList.remove('show');
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('btnSubmit').disabled = false;
  document.getElementById('btnSubmit').textContent = '제출하기';

  document.getElementById('formArea').style.display = 'block';
  document.getElementById('resultArea').classList.remove('show');

  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
